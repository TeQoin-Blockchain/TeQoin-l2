name: Security checks

on:
  pull_request:
  push:
    branches: [main, develop, test]
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks CLI
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.28.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run Gitleaks secret scan
        run: gitleaks detect --source . --no-git --redact --verbose

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  npm-audit:
    name: npm audit (${{ matrix.path }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: [sequencer, l2-indexer]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.path }}
      - run: npm audit --omit=dev --audit-level=high
        working-directory: ${{ matrix.path }}

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Rust workspace presence
        id: rust-workspace
        run: |
          if [ -f teqoin-core/Cargo.toml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "teqoin-core/Cargo.toml not present in this checkout; skipping cargo audit."
          fi
      - uses: dtolnay/rust-toolchain@stable
        if: steps.rust-workspace.outputs.present == 'true'
      - uses: taiki-e/install-action@cargo-audit
        if: steps.rust-workspace.outputs.present == 'true'
      - if: steps.rust-workspace.outputs.present == 'true'
        working-directory: teqoin-core
        run: cargo audit
