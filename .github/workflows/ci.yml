name: CI

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check repo hygiene
        run: ./scripts/check-repo-hygiene.sh

  typescript:
    name: TypeScript build (${{ matrix.package.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: sequencer
            path: sequencer
          - name: l2-indexer
            path: l2-indexer
          - name: sepolia-indexer
            path: sepolia-indexer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.package.path }}/package-lock.json
      - name: Install dependencies
        working-directory: ${{ matrix.package.path }}
        run: npm ci
      - name: Build
        working-directory: ${{ matrix.package.path }}
        run: npm run build
      - name: Audit production dependencies
        working-directory: ${{ matrix.package.path }}
        run: npm audit --omit=dev --audit-level=high

  rust:
    name: Rust core
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: teqoin-core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: teqoin-core -> target
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  solidity:
    name: Solidity / Foundry
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sequencer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sequencer/package-lock.json
      - name: Install JS dependencies for remappings
        run: npm ci
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Forge tests
        run: forge test -vvv

  docker-build:
    name: Docker build checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - teqoin-geth/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.dockerfile }}
        run: docker build -f ${{ matrix.dockerfile }} -t teqoin-check:${{ github.sha }} teqoin-geth
